name: fieldtrack
description: "A new Flutter project."

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.12.2


dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  get: ^4.7.3
  dio: ^5.9.0
  shared_preferences: ^2.5.4
  flutter_secure_storage: ^9.2.4
  flutter_screenutil: ^5.9.3
  fluttertoast: ^9.0.0
  image_picker: ^1.2.1
  path: ^1.9.1
  dotted_border: ^3.1.0
  file_picker: ^10.3.8
  flutter_svg: ^2.2.3
  intl: ^0.20.2
  shimmer: ^3.0.0
  connectivity_plus: ^7.0.0
  url_launcher: ^6.3.2
  local_auth: ^3.0.0
  lottie: ^3.3.2
  cached_network_image: ^3.4.1
  hive_ce: ^2.4.4
  hive_ce_flutter: ^2.1.0
  geolocator: ^13.0.4
  flutter_local_notifications: ^22.0.1
  permission_handler: ^12.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/logo/
    - assets/images/png/demo/
    - assets/images/png/home/
    - assets/images/png/onboarding/
    - assets/images/png/verify_id/
    - assets/images/png/payment_option/
    - assets/images/png/success/
    - assets/images/png/support/
    - assets/images/svg/splash/
    - assets/images/svg/empty/
    - assets/icon/home/
    - assets/icon/menu/
    - assets/icon/profile/
    - assets/icon/bottom_navbar/
    - assets/icon/support/
    - assets/icon/common/
    - assets/others/

  fonts:
    - family: Outfit
      fonts:
        - asset: assets/fonts/Outfit-Light.ttf
          weight: 300
        - asset: assets/fonts/Outfit-Regular.ttf
          weight: 400
        - asset: assets/fonts/Outfit-Medium.ttf
          weight: 500
        - asset: assets/fonts/Outfit-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Outfit-Bold.ttf
          weight: 700
        - asset: assets/fonts/Outfit-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Outfit-Black.ttf
          weight: 900