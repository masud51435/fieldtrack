name: fieldtrack
description: "Flutter App Template"

publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  get: ^4.7.3
  dio: ^5.9.0
  shared_preferences: ^2.5.4
  flutter_secure_storage: ^9.2.4
  flutter_screenutil: ^5.9.3
  fluttertoast: ^9.0.0
  pin_code_fields: ^8.0.1
  image_picker: ^1.2.1
  path: ^1.9.1
  dotted_border: ^3.1.0
  file_picker: ^10.3.8
  flutter_svg: ^2.2.3
  webview_flutter: ^4.13.1
  intl: ^0.20.2
  share_plus: ^12.0.1
  shimmer: ^3.0.0
  device_info_plus: ^12.3.0
  connectivity_plus: ^7.0.0
  change_package_name: ^1.1.0
  url_launcher: ^6.3.2
  local_auth: ^3.0.0
  firebase_core: ^4.4.0
  firebase_messaging: ^16.1.1
  flutter_local_notifications: ^20.1.0
  change_app_package_name: ^1.5.0
  flutter_widget_from_html: ^0.17.1
  lottie: ^3.3.2
  carousel_slider: ^5.1.1
  country_flags: ^4.1.2
  cached_network_image: ^3.4.1
  hive_ce: ^2.4.4
  hive_ce_flutter: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/logo/
    - assets/images/png/demo/
    - assets/images/png/home/
    - assets/images/png/onboarding/
    - assets/images/png/verify_id/
    - assets/images/png/payment_option/
    - assets/images/png/success/
    - assets/images/png/support/
    - assets/images/svg/splash/
    - assets/images/svg/empty/
    - assets/icon/home/
    - assets/icon/menu/
    - assets/icon/profile/
    - assets/icon/bottom_navbar/
    - assets/icon/support/
    - assets/icon/common/
    - assets/others/

  fonts:
    - family: Outfit
      fonts:
        - asset: assets/fonts/Outfit-Light.ttf
          weight: 300
        - asset: assets/fonts/Outfit-Regular.ttf
          weight: 400
        - asset: assets/fonts/Outfit-Medium.ttf
          weight: 500
        - asset: assets/fonts/Outfit-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Outfit-Bold.ttf
          weight: 700
        - asset: assets/fonts/Outfit-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Outfit-Black.ttf
          weight: 900
